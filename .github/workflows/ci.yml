name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Display workflow info
        run: |
          echo "🚀 Running CI pipeline!"
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
      
      - name: Check if README exists
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md exists"
          else
            echo "❌ README.md missing!"
            exit 1
          fi
      
      - name: Check exercise structure
        run: |
          echo "📁 Checking exercise structure..."
          for dir in exercises/01-* exercises/02-* exercises/03-* exercises/04-*; do
            if [ -d "$dir" ]; then
              echo "✅ Found: $dir"
            else
              echo "⚠️  Missing: $dir"
            fi
          done
      
      - name: Validate YAML files
        run: |
          echo "🔍 Validating YAML files..."
          if [ -f .github/workflows/ci.yml ]; then
            echo "✅ CI workflow file exists"
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "Testing repository structure..."
          
          # Check all required files
          files=(
            "README.md"
            "exercises/01-pull-request-basics/README.md"
            "exercises/02-forking-workflow/README.md"
            "exercises/03-collaboration-patterns/README.md"
            "exercises/04-cicd-github-actions/README.md"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing!"
              exit 1
            fi
          done
          
          echo "✅ All tests passed!"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build project
        run: |
          echo "🔨 Building project..."
          echo "Generating build report..."
          
          # Create a simple build artifact
          mkdir -p build
          echo "# Build Report" > build/report.md
          echo "Date: $(date)" >> build/report.md
          echo "Commit: ${{ github.sha }}" >> build/report.md
          echo "Branch: ${{ github.ref }}" >> build/report.md
          
          echo "✅ Build successful!"
          
          # Upload artifact
          echo "📦 Build artifacts created in ./build/"
